name: .NET (Windows)

on:
  push:
    branches: ["main"]
    paths: ["windows/**"]
  pull_request:
    branches: ["main"]
    paths: ["windows/**"]
  create:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build
        run: dotnet build windows/StripedPrinter.sln -c Release

      - name: Publish (self-contained single file)
        run: |
          dotnet publish windows/StripedPrinter/StripedPrinter.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -o windows/.build/publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: StripedPrinter-win-x64
          path: windows/.build/publish/StripedPrinter.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: |
          dotnet publish windows/StripedPrinter/StripedPrinter.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -o windows/.build/publish

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: windows/.build/publish/StripedPrinter.exe
